[gateway]
host = "192.168.1.100"   # Your IQ Gateway LAN IP (or "envoy.local")
token = "eyJ..."          # JWT from Enphase cloud — do not commit the real value

[polling]
interval_secs = 60        # Poll interval in seconds (minimum: 15)

[api]
host = "0.0.0.0"
port = 8080

[storage]
db_path = "./energy.db"

[tou]
openei_api_key = "your_openei_key_here"

# Your utility's EIA ID from the OpenEI URDB (https://openei.org/wiki/Utility_Rate_Database)
# Common examples:
#   SDG&E (San Diego, CA):      16609
#   PG&E (Northern California): 14701
#   SCE (Southern California):   3970
utility_eia_id = 16609

# The exact rate plan name as listed in OpenEI for your utility above.
# To find yours: search the URDB for your utility, then copy the "Name" field exactly.
# SDG&E examples: "TOU-DR Coastal Baseline Region", "TOU-DR Inland Baseline Region"
# PG&E examples:  "E-TOU-C"
# SCE examples:   "TOU-GS-1-B"
rate_label = "TOU-DR Coastal Baseline Region"

# Optional: group inverters into named arrays for /api/inverters/arrays
# Serial numbers come from /api/v1/production/inverters on your gateway.
# If omitted, the endpoint returns an empty arrays list.
[arrays]
default = [
    "202321152253",
    "202322032109",
    # add more serial numbers here
]
# east-roof = ["serial1", "serial2"]
# west-roof = ["serial3", "serial4"]
