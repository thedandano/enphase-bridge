[gateway]
host = "192.168.1.100"   # Your IQ Gateway LAN IP (or "envoy.local")
token = "eyJ..."          # JWT from Enphase cloud — do not commit the real value

[polling]
interval_secs = 60        # Poll interval in seconds (minimum: 15)

[api]
host = "0.0.0.0"
port = 8080

[storage]
db_path = "./energy.db"

[tou]
openei_api_key = "your_openei_key_here"
# Your utility's rate schedule label from OpenEI URDB. This applies to ANY utility,
# not just SDG&E. Find your utility and rate schedule at:
# https://openei.org/wiki/Utility_Rate_Database
#
# Examples:
#   SDG&E EIA 16609 (San Diego, CA):
#     - "TOU-DR Coastal Baseline Region"
#     - "TOU-DR Inland Baseline Region"
#     - "TOU-DR Desert Baseline Region"
#     - "TOU-DR Mountain Baseline Region"
#   PG&E (Northern California):
#     - "E-TOU-C" (residential, PG&E EIA 14701)
#   Southern California Edison (SCE):
#     - "TOU-GS-1-B" (small commercial, SCE EIA 3970)
#
# To find your utility's exact rate label:
# 1. Go to https://openei.org/wiki/Utility_Rate_Database
# 2. Search for your utility name and state
# 3. Find your rate schedule in the results
# 4. Use the exact value from the "Name" field
sdge_rate_label = "TOU-DR Coastal Baseline Region"

# Optional: group inverters into named arrays for /api/inverters/arrays
# Serial numbers come from /api/v1/production/inverters on your gateway.
# If omitted, the endpoint returns an empty arrays list.
[arrays]
default = [
    "202321152253",
    "202322032109",
    # add more serial numbers here
]
# east-roof = ["serial1", "serial2"]
# west-roof = ["serial3", "serial4"]
