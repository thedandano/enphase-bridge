name: Release

on:
  push:
    branches: [main]

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: rust
          bump-minor-pre-major: false
          monorepo-tags: false
          prerelease: true
