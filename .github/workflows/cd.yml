name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    # No branch filter — tag-triggered CI runs have head_branch == the tag name (e.g. v0.1.0),
    # which the branches filter would reject. Scoping is done via job-level if conditions below.

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build (${{ matrix.arch }})
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' ||
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "${digest#sha256:}" > /tmp/digests/${{ matrix.arch }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish multi-arch manifest
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          refs=()
          for arch in amd64 arm64; do
            if [[ ! -s "$arch" ]]; then
              echo "Missing digest for $arch" >&2
              exit 1
            fi
            refs+=("${IMAGE}@sha256:$(cat "$arch")")
          done
          short_sha="${HEAD_SHA:0:7}"
          tags=(-t "${IMAGE}:${short_sha}")
          if [[ "${HEAD_BRANCH}" == v* ]]; then
            tags+=(-t "${IMAGE}:${HEAD_BRANCH}" -t "${IMAGE}:latest")
            echo "Publishing version tag: ${HEAD_BRANCH}"
          else
            tags+=(-t "${IMAGE}:latest")
          fi
          docker buildx imagetools create "${tags[@]}" "${refs[@]}"
          docker buildx imagetools inspect "${IMAGE}:${short_sha}"

